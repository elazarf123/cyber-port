<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=Share+Tech+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050a0e"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="none" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.25;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="510" fill="#00d4ff"/>

  <!-- Top accent line -->
  <rect x="60" y="60" width="600" height="1" fill="#00d4ff" opacity="0.4"/>

  <!-- Panel -->
  <rect x="80" y="80" width="700" height="470" fill="#0a1520" rx="0" opacity="0.6"/>
  <rect x="80" y="80" width="700" height="3" fill="#00d4ff"/>

  <!-- Status tag -->
  <text x="100" y="130" font-family="monospace" font-size="13" fill="#00ff88" letter-spacing="4">// IT SYSTEMS &amp; IDENTITY ADMINISTRATOR</text>

  <!-- Name -->
  <text x="100" y="210" font-family="monospace" font-size="64" font-weight="900" fill="#e8f8ff" letter-spacing="2">ELAZAR</text>
  <text x="100" y="285" font-family="monospace" font-size="64" font-weight="900" fill="#00d4ff" letter-spacing="2">FERRER</text>

  <!-- Title line -->
  <text x="100" y="340" font-family="monospace" font-size="16" fill="#4a7a8a" letter-spacing="2">&gt; Active Directory &amp; M365 Specialist | 3+ Years Enterprise IT</text>

  <!-- Divider -->
  <rect x="100" y="365" width="500" height="1" fill="#1a3a4a"/>

  <!-- Cert badge -->
  <rect x="100" y="385" width="260" height="44" fill="rgba(0,255,136,0.07)" rx="0"/>
  <rect x="100" y="385" width="2" height="44" fill="#00ff88"/>
  <text x="114" y="403" font-family="monospace" font-size="10" fill="#00ff88" letter-spacing="3">✓ CERTIFIED</text>
  <text x="114" y="421" font-family="monospace" font-size="13" fill="#e8f8ff">CompTIA Security+  |  March 2026</text>

  <!-- Experience stats row -->
  <text x="100" y="475" font-family="monospace" font-size="11" fill="#4a7a8a" letter-spacing="2">EXPERIENCE</text>
  <text x="100" y="498" font-family="monospace" font-size="22" font-weight="700" fill="#00d4ff">3+ YRS</text>

  <text x="250" y="475" font-family="monospace" font-size="11" fill="#4a7a8a" letter-spacing="2">USERS ADMIN</text>
  <text x="250" y="498" font-family="monospace" font-size="22" font-weight="700" fill="#00d4ff">500+</text>

  <text x="400" y="475" font-family="monospace" font-size="11" fill="#4a7a8a" letter-spacing="2">AVAILABILITY</text>
  <text x="400" y="498" font-family="monospace" font-size="22" font-weight="700" fill="#00ff88">OPEN</text>

  <!-- Right column decoration -->
  <rect x="860" y="80" width="280" height="470" fill="#080f14" opacity="0.8"/>
  <rect x="860" y="80" width="280" height="3" fill="#00d4ff" opacity="0.5"/>

  <text x="880" y="140" font-family="monospace" font-size="11" fill="#4a7a8a" letter-spacing="3">SKILLS</text>
  <text x="880" y="175" font-family="monospace" font-size="13" fill="#c8e8f0">Active Directory (AD DS)</text>
  <text x="880" y="200" font-family="monospace" font-size="13" fill="#c8e8f0">Azure AD / Entra ID</text>
  <text x="880" y="225" font-family="monospace" font-size="13" fill="#c8e8f0">Microsoft 365 / Exchange</text>
  <text x="880" y="250" font-family="monospace" font-size="13" fill="#c8e8f0">PowerShell Automation</text>
  <text x="880" y="275" font-family="monospace" font-size="13" fill="#c8e8f0">Group Policy (GPO)</text>
  <text x="880" y="300" font-family="monospace" font-size="13" fill="#c8e8f0">DNS / DHCP / PKI</text>
  <text x="880" y="325" font-family="monospace" font-size="13" fill="#c8e8f0">Intune / MDM</text>
  <text x="880" y="350" font-family="monospace" font-size="13" fill="#c8e8f0">HIPAA Compliance</text>
  <text x="880" y="375" font-family="monospace" font-size="13" fill="#c8e8f0">Conditional Access</text>
  <text x="880" y="400" font-family="monospace" font-size="13" fill="#c8e8f0">ITIL / ServiceNow</text>

  <rect x="880" y="425" width="240" height="1" fill="#1a3a4a"/>
  <text x="880" y="455" font-family="monospace" font-size="11" fill="#4a7a8a" letter-spacing="3">LOCATION</text>
  <text x="880" y="478" font-family="monospace" font-size="13" fill="#00d4ff">Lubbock, TX</text>
  <text x="880" y="498" font-family="monospace" font-size="11" fill="#c8e8f0">Remote / Hybrid</text>

  <!-- URL tag bottom -->
  <text x="100" y="590" font-family="monospace" font-size="12" fill="#1a3a4a" letter-spacing="2">elazarf123.github.io/cyber-port</text>
</svg>
