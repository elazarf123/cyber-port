<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume | Elazar Ferrer — IT Systems & Identity Administrator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23050a0e'/><text y='.9em' font-size='80' x='10'>🔐</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a0e; --panel: #0a1520; --panel2: #0d1c2a;
      --accent: #00d4ff; --accent2: #00ff88;
      --text: #c8e8f0; --text-dim: #4a7a8a; --text-bright: #e8f8ff;
      --border: #1a3a4a;
      --mono: 'Share Tech Mono', monospace;
      --head: 'Orbitron', monospace;
      --body: 'Rajdhani', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
      pointer-events: none;
      z-index: 9999;
    }
    nav {
      position: fixed; top: 0; width: 100%;
      background: rgba(5,10,14,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo { font-family: var(--head); font-size: 0.85rem; color: var(--accent); letter-spacing: 0.2em; text-decoration: none; }
    .nav-logo span { color: var(--accent2); }
    .nav-back { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .nav-back:hover { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 2rem 60px;
    }
    .resume-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .resume-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-family: var(--head);
      font-size: 1.4rem;
      color: var(--text-bright);
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .resume-name {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--bg);
      background: var(--accent);
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      letter-spacing: 0.1em;
      transition: opacity 0.2s;
      margin-bottom: 1.25rem;
    }
    .download-btn:hover { opacity: 0.85; }
    .resume-hint {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      letter-spacing: 0.1em;
      transition: all 0.2s;
      margin-top: 1.5rem;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">EF_<span>SYS</span></a>
    <a href="index.html" class="nav-back">← BACK TO PORTFOLIO</a>
  </div>
</nav>

<main>
  <div class="resume-card">
    <div class="resume-label">// RESUME</div>
    <h1>ELAZAR FERRER</h1>
    <p class="resume-name">IT Systems &amp; Identity Administrator</p>
    <a href="Elazar_Ferrer_IT_Resume.pdf" class="download-btn" download>
      ↓ DOWNLOAD RESUME (PDF)
    </a>
    <p class="resume-hint">Click to download or open in browser</p>
  </div>
  <a href="index.html" class="back-btn">← BACK TO PORTFOLIO</a>
</main>

</body>
</html>
